# ─────────────────────────────────────────────────────────────
# SocioVert — Nginx Configuration Template
# Place at: /etc/nginx/sites-available/sociovert
# Symlink:  ln -s /etc/nginx/sites-available/sociovert /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name convert.yourdomain.com;  # ← Change this

    # Redirect HTTP to HTTPS (uncomment after setting up SSL)
    # return 301 https://$server_name$request_uri;

    client_max_body_size 2G;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for large file uploads/conversions
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}

